name: Sync upstream and apply patches

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

concurrency:
  group: pebble-auto-patch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository != 'QingJ01/Pebble'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream and apply patches
        shell: pwsh
        run: ./scripts/update-and-apply-patches.ps1 -Push
