name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.0.9
        required: true
        default: v0.0.9

permissions:
  contents: write

jobs:
  windows:
    name: Windows Release
    runs-on: windows-latest
    environment: action

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Validate release version
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ inputs.tag || github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH, got '$tag'."
          }
          $version = $Matches.version

          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          if ($cargoToml -notmatch '(?m)^version\s*=\s*"(?<version>[^"]+)"') {
            throw "Could not read src-tauri/Cargo.toml package version."
          }
          $cargoVersion = $Matches.version

          $versions = @{
            "package.json" = $packageVersion
            "src-tauri/tauri.conf.json" = $tauriVersion
            "src-tauri/Cargo.toml" = $cargoVersion
          }
          foreach ($entry in $versions.GetEnumerator()) {
            if ($entry.Value -ne $version) {
              throw "$($entry.Key) version '$($entry.Value)' does not match tag '$tag'."
            }
          }
          "PEBBLE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Validate OAuth build config
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($name in @("GOOGLE_CLIENT_ID", "GOOGLE_CLIENT_SECRET", "MICROSOFT_CLIENT_ID")) {
            $value = [Environment]::GetEnvironmentVariable($name)
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "$name is not configured in the 'action' GitHub environment."
            }
          }
          "OAuth client IDs and Google client secret are configured for this release build."

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check Rust lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run frontend tests
        run: pnpm test

      - name: Build Windows installer
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        run: pnpm build:windows

      - name: Collect release artifacts
        run: |
          $ErrorActionPreference = "Stop"
          $artifactDir = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $installers = Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*.exe" -File
          if ($installers.Count -eq 0) {
            throw "No NSIS installer found in target/release/bundle/nsis."
          }

          foreach ($installer in $installers) {
            Copy-Item -Path $installer.FullName -Destination $artifactDir
          }

          Get-ChildItem -Path $artifactDir -File | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Set-Content -Path "$($_.FullName).sha256" -Encoding ascii
          }

          Get-ChildItem -Path $artifactDir -File | Select-Object Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pebble-windows-${{ env.PEBBLE_VERSION }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          function Invoke-Gh {
            param([Parameter(ValueFromRemainingArguments = $true)][string[]]$Arguments)
            & gh @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw "gh $($Arguments -join ' ') failed with exit code $LASTEXITCODE."
            }
          }

          $tag = "${{ inputs.tag || github.ref_name }}"
          $version = $tag.Substring(1)
          $title = "Pebble $tag"
          $changelog = Get-Content CHANGELOG.md -Raw
          $escapedVersion = [regex]::Escape($version)
          $match = [regex]::Match($changelog, "(?ms)^## \[$escapedVersion\][^\r\n]*\r?\n(?<body>.*?)(?=^## \[|\z)")
          if (-not $match.Success) {
            throw "Could not find changelog notes for $version."
          }

          $notesFile = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $match.Groups["body"].Value.Trim() | Set-Content -Path $notesFile -Encoding utf8

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Invoke-Gh release edit $tag --title $title --notes-file $notesFile
            Invoke-Gh release upload $tag release-artifacts/* --clobber
          } else {
            Invoke-Gh release create $tag release-artifacts/* --title $title --notes-file $notesFile
          }

  linux:
    name: Linux Package Release
    needs: windows
    runs-on: ubuntu-latest
    environment: action

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libkeyutils-dev \
            patchelf \
            rpm

      - name: Validate release version
        run: |
          set -euo pipefail

          tag="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, got '$tag'." >&2
            exit 1
          fi
          version="${BASH_REMATCH[1]}"

          package_version="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version)")"
          tauri_version="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version)")"
          cargo_version="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' src-tauri/Cargo.toml | head -n 1)"

          if [[ "$package_version" != "$version" ]]; then
            echo "package.json version '$package_version' does not match tag '$tag'." >&2
            exit 1
          fi
          if [[ "$tauri_version" != "$version" ]]; then
            echo "src-tauri/tauri.conf.json version '$tauri_version' does not match tag '$tag'." >&2
            exit 1
          fi
          if [[ "$cargo_version" != "$version" ]]; then
            echo "src-tauri/Cargo.toml version '$cargo_version' does not match tag '$tag'." >&2
            exit 1
          fi

          echo "PEBBLE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Validate OAuth build config
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          for name in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET MICROSOFT_CLIENT_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is not configured in the 'action' GitHub environment." >&2
              exit 1
            fi
          done
          echo "OAuth client IDs and Google client secret are configured for this release build."

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux packages
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        run: pnpm build:linux

      - name: Collect release artifacts
        run: |
          set -euo pipefail
          artifact_dir="release-artifacts"
          mkdir -p "$artifact_dir"

          search_dirs=(
            "target/release/bundle/appimage"
            "src-tauri/target/release/bundle/appimage"
            "target/release/bundle/deb"
            "src-tauri/target/release/bundle/deb"
            "target/release/bundle/rpm"
            "src-tauri/target/release/bundle/rpm"
          )

          found=()
          for dir in "${search_dirs[@]}"; do
            if [[ -d "$dir" ]]; then
              while IFS= read -r -d '' package; do
                found+=("$package")
              done < <(find "$dir" -maxdepth 1 -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -print0)
            fi
          done

          if [[ "${#found[@]}" -eq 0 ]]; then
            echo "No Linux package artifacts found in expected bundle directories." >&2
            exit 1
          fi

          for package in "${found[@]}"; do
            cp "$package" "$artifact_dir/$(basename "$package")"
          done

          for file in "$artifact_dir"/*; do
            hash="$(sha256sum "$file" | awk '{print $1}')"
            printf '%s  %s\n' "$hash" "$(basename "$file")" > "$file.sha256"
          done

          ls -lh "$artifact_dir"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pebble-linux-packages-${{ env.PEBBLE_VERSION }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Upload Linux assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          gh release upload "$tag" release-artifacts/* --clobber

  macos:
    name: macOS Release (${{ matrix.arch }})
    needs: windows
    runs-on: ${{ matrix.os }}
    environment: action

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            arch: arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Validate release version
        run: |
          set -euo pipefail

          tag="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, got '$tag'." >&2
            exit 1
          fi
          version="${BASH_REMATCH[1]}"

          package_version="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version)")"
          tauri_version="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version)")"
          cargo_version="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' src-tauri/Cargo.toml | head -n 1)"

          if [[ "$package_version" != "$version" ]]; then
            echo "package.json version '$package_version' does not match tag '$tag'." >&2
            exit 1
          fi
          if [[ "$tauri_version" != "$version" ]]; then
            echo "src-tauri/tauri.conf.json version '$tauri_version' does not match tag '$tag'." >&2
            exit 1
          fi
          if [[ "$cargo_version" != "$version" ]]; then
            echo "src-tauri/Cargo.toml version '$cargo_version' does not match tag '$tag'." >&2
            exit 1
          fi

          echo "PEBBLE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Validate OAuth build config
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          for name in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET MICROSOFT_CLIENT_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is not configured in the 'action' GitHub environment." >&2
              exit 1
            fi
          done
          echo "OAuth client IDs and Google client secret are configured for this release build."

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
        run: pnpm tauri build --target ${{ matrix.target }} --bundles app,dmg

      - name: Collect release artifacts
        run: |
          set -euo pipefail
          artifact_dir="release-artifacts"
          mkdir -p "$artifact_dir"

          search_dirs=(
            "target/${{ matrix.target }}/release/bundle/dmg"
            "target/release/bundle/dmg"
          )

          found=()
          for dir in "${search_dirs[@]}"; do
            if [[ -d "$dir" ]]; then
              while IFS= read -r -d '' dmg; do
                found+=("$dmg")
              done < <(find "$dir" -maxdepth 1 -type f -name "*.dmg" -print0)
            fi
          done

          if [[ "${#found[@]}" -eq 0 ]]; then
            echo "No DMG found in expected macOS bundle directories." >&2
            exit 1
          fi

          for dmg in "${found[@]}"; do
            base="$(basename "$dmg")"
            stem="${base%.dmg}"
            cp "$dmg" "$artifact_dir/${stem}-${{ matrix.arch }}.dmg"
          done

          for file in "$artifact_dir"/*; do
            hash="$(shasum -a 256 "$file" | awk '{print $1}')"
            printf '%s  %s\n' "$hash" "$(basename "$file")" > "$file.sha256"
          done

          ls -lh "$artifact_dir"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pebble-macos-${{ matrix.arch }}-${{ env.PEBBLE_VERSION }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Upload macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          gh release upload "$tag" release-artifacts/* --clobber
