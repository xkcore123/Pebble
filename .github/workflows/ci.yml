name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Test and Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: build:windows
          - os: macos-15
            build_script: build:macos
          - os: ubuntu-latest
            build_script: build:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libkeyutils-dev \
            patchelf \
            rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check Rust lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build:frontend

      - name: Build desktop package
        run: pnpm ${{ matrix.build_script }}

      - name: Upload Linux package artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: pebble-linux-packages
          path: |
            target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
